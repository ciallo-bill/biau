<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="810" viewBox="0 0 1440 810" role="img" aria-labelledby="title desc">
  <title id="title">Ozon ERP operation workflow</title>
  <desc id="desc">A desensitized workflow diagram for the Ozon ERP showing admin workspace, browser extension, API service, task worker, audit trail, and Ozon adapter boundaries.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.52" stop-color="#eef5ff"/>
      <stop offset="1" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0052d9"/>
      <stop offset="1" stop-color="#4d7cff"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b8f6a"/>
      <stop offset="1" stop-color="#22c58b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#17365f" flood-opacity="0.16"/>
    </filter>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M1,1 L13,7 L1,13 Z" fill="#0052d9"/>
    </marker>
    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M1,1 L13,7 L1,13 Z" fill="#0b8f6a"/>
    </marker>
    <style>
      .title { fill: #0f172a; font: 800 48px Inter, "Segoe UI", Arial, sans-serif; }
      .subtitle { fill: #53617d; font: 600 22px Inter, "Segoe UI", Arial, sans-serif; }
      .label { fill: #0f172a; font: 800 27px Inter, "Segoe UI", Arial, sans-serif; }
      .body { fill: #5c6b7d; font: 600 19px Inter, "Segoe UI", Arial, sans-serif; }
      .small { fill: #6c7a89; font: 700 16px Inter, "Segoe UI", Arial, sans-serif; }
      .white { fill: #fff; }
      .box { fill: #ffffff; stroke: #d9e8f8; stroke-width: 2; rx: 24; filter: url(#shadow); }
      .soft { fill: #f8fbff; stroke: #d9e8f8; stroke-width: 2; rx: 18; }
      .lineBlue { stroke: #0052d9; stroke-width: 4; fill: none; marker-end: url(#arrowBlue); }
      .lineGreen { stroke: #0b8f6a; stroke-width: 4; fill: none; marker-end: url(#arrowGreen); }
      .dash { stroke-dasharray: 10 12; }
    </style>
  </defs>

  <rect width="1440" height="810" fill="url(#bg)"/>
  <circle cx="1160" cy="110" r="190" fill="#cce2ff" opacity="0.36"/>
  <circle cx="250" cy="690" r="230" fill="#d9f5e6" opacity="0.34"/>

  <text x="80" y="96" class="title">Ozon ERP 运营链路</text>
  <text x="82" y="138" class="subtitle">公开展示只保留职责边界和安全写入流程，不包含店铺凭证、Cookie、真实域名、端口或部署记录。</text>

  <rect x="80" y="210" width="260" height="176" class="box"/>
  <rect x="112" y="242" width="64" height="64" rx="18" fill="url(#blue)"/>
  <text x="128" y="283" class="white" style="font: 900 28px Inter, Arial;">UI</text>
  <text x="112" y="334" class="label">Vue 管理后台</text>
  <text x="112" y="365" class="body">商品 / 订单 / 店铺</text>
  <text x="112" y="394" class="body">审批中心 / 任务中心</text>

  <rect x="80" y="500" width="260" height="176" class="box"/>
  <rect x="112" y="532" width="64" height="64" rx="18" fill="url(#green)"/>
  <text x="124" y="573" class="white" style="font: 900 27px Inter, Arial;">MV3</text>
  <text x="112" y="624" class="label">浏览器插件</text>
  <text x="112" y="655" class="body">页面采集</text>
  <text x="112" y="684" class="body">铺货入口</text>

  <rect x="448" y="250" width="300" height="220" class="box"/>
  <text x="486" y="306" class="label">Express API</text>
  <rect x="486" y="338" width="226" height="42" rx="12" fill="#eef6ff" stroke="#c8dcf3"/>
  <text x="506" y="366" class="body">鉴权与业务校验</text>
  <rect x="486" y="394" width="226" height="42" rx="12" fill="#eefbf6" stroke="#c9eadb"/>
  <text x="506" y="422" class="body">平台适配与审批</text>

  <rect x="838" y="180" width="270" height="170" class="box"/>
  <text x="872" y="235" class="label">安全写入门禁</text>
  <text x="872" y="271" class="body">写入模式检查</text>
  <text x="872" y="303" class="body">PendingAction</text>
  <text x="872" y="335" class="small">默认可切回 Mock / 队列</text>

  <rect x="838" y="470" width="270" height="170" class="box"/>
  <text x="872" y="525" class="label">Worker 队列</text>
  <text x="872" y="561" class="body">同步 / 导入 / 长任务</text>
  <text x="872" y="593" class="body">JobQueue 结果记录</text>
  <text x="872" y="625" class="small">队列模式需显式启用</text>

  <rect x="1190" y="250" width="190" height="220" class="box"/>
  <text x="1222" y="306" class="label">Ozon 适配</text>
  <text x="1222" y="342" class="body">商品上架</text>
  <text x="1222" y="374" class="body">调价库存</text>
  <text x="1222" y="406" class="body">发货同步</text>
  <text x="1222" y="440" class="small">只展示边界</text>

  <rect x="448" y="560" width="300" height="120" class="box"/>
  <text x="486" y="615" class="label">审计与交付</text>
  <text x="486" y="650" class="body">操作日志 / 备份迁移 / 接手清单</text>

  <path d="M340 300 C380 300 408 312 448 330" class="lineBlue"/>
  <path d="M340 588 C390 588 410 460 448 410" class="lineGreen"/>
  <path d="M748 360 C790 348 800 300 838 276" class="lineBlue"/>
  <path d="M748 420 C792 450 802 520 838 555" class="lineGreen"/>
  <path d="M1108 265 C1142 282 1156 318 1190 342" class="lineBlue"/>
  <path d="M1108 558 C1146 540 1162 470 1190 420" class="lineGreen dash"/>
  <path d="M972 350 C930 420 780 620 748 620" class="lineBlue dash"/>

  <rect x="80" y="724" width="1280" height="44" rx="16" fill="#ffffff" opacity="0.84" stroke="#dbe8f8"/>
  <text x="112" y="753" class="small">展示口径：插件负责采集入口，后台负责运营动作，API 统一校验和审计；真实写入必须经过适配边界、写入开关和审计记录。</text>
</svg>
