<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Ozon ERP system cover</title>
  <desc id="desc">Dashboard style cover showing ERP modules, API, database, Redis queue and browser extension.</desc>
