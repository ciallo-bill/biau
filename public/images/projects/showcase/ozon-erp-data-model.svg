<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="810" viewBox="0 0 1440 810" role="img" aria-labelledby="title desc">
  <title id="title">Ozon ERP data and approval model</title>
  <desc id="desc">A desensitized data model diagram for the Ozon ERP showing store, product, order, pending action, audit log, job queue, and plugin draft relationships.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfdff"/>
      <stop offset="0.55" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#f7fbff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0052d9"/>
      <stop offset="1" stop-color="#4d7cff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="17" flood-color="#17365f" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M1,1 L13,7 L1,13 Z" fill="#0052d9"/>
    </marker>
    <style>
      .title { fill: #0f172a; font: 800 48px Inter, "Segoe UI", Arial, sans-serif; }
      .subtitle { fill: #53617d; font: 600 22px Inter, "Segoe UI", Arial, sans-serif; }
      .label { fill: #0f172a; font: 800 25px Inter, "Segoe UI", Arial, sans-serif; }
      .body { fill: #5c6b7d; font: 600 18px Inter, "Segoe UI", Arial, sans-serif; }
      .small { fill: #6c7a89; font: 700 16px Inter, "Segoe UI", Arial, sans-serif; }
      .box { fill: #ffffff; stroke: #d9e8f8; stroke-width: 2; rx: 22; filter: url(#shadow); }
      .core { fill: #f7fbff; stroke: #c6dcf5; stroke-width: 2; rx: 20; }
      .line { stroke: #0052d9; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 10 12; }
      .pill { fill: #eef6ff; stroke: #c8dcf3; stroke-width: 1.5; rx: 12; }
    </style>
  </defs>

  <rect width="1440" height="810" fill="url(#bg)"/>
  <circle cx="1180" cy="135" r="190" fill="#cce2ff" opacity="0.35"/>
  <circle cx="230" cy="670" r="220" fill="#d9f5e6" opacity="0.3"/>

  <text x="80" y="96" class="title">Ozon ERP 数据与审批模型</text>
  <text x="82" y="138" class="subtitle">展示核心业务对象与可审计写入路径；真实店铺、订单号、数据库连接、备份哈希和部署参数均不进入公开页面。</text>

  <rect x="92" y="210" width="245" height="155" class="box"/>
  <text x="125" y="264" class="label">店铺授权</text>
  <text x="125" y="300" class="body">店铺状态</text>
  <text x="125" y="330" class="body">凭证加密存储</text>

  <rect x="430" y="180" width="245" height="155" class="box"/>
  <text x="463" y="234" class="label">商品与库存</text>
  <text x="463" y="270" class="body">商品基础资料</text>
  <text x="463" y="300" class="body">价格 / 库存 / 类目</text>

  <rect x="430" y="430" width="245" height="155" class="box"/>
  <text x="463" y="484" class="label">订单与退货</text>
  <text x="463" y="520" class="body">订单同步</text>
  <text x="463" y="550" class="body">物流与售后状态</text>

  <rect x="770" y="220" width="300" height="210" class="core"/>
  <text x="810" y="278" class="label">PendingAction</text>
  <text x="810" y="314" class="body">上架 / 改价 / 改库存 / 发货</text>
  <rect x="810" y="344" width="104" height="40" class="pill"/>
  <text x="832" y="371" class="body">待审批</text>
  <rect x="936" y="344" width="94" height="40" class="pill"/>
  <text x="958" y="371" class="body">已执行</text>
  <text x="810" y="412" class="small">所有写操作先形成可追踪动作</text>

  <rect x="1168" y="170" width="210" height="155" class="box"/>
  <text x="1200" y="224" class="label">审计日志</text>
  <text x="1200" y="260" class="body">操作人</text>
  <text x="1200" y="290" class="body">动作与结果</text>

  <rect x="1168" y="470" width="210" height="155" class="box"/>
  <text x="1200" y="524" class="label">任务队列</text>
  <text x="1200" y="560" class="body">同步任务</text>
  <text x="1200" y="590" class="body">导入导出结果</text>

  <rect x="92" y="475" width="245" height="155" class="box"/>
  <text x="125" y="529" class="label">采集草稿</text>
  <text x="125" y="565" class="body">插件采集商品</text>
  <text x="125" y="595" class="body">清洗后进入审批</text>

  <path d="M337 288 C375 274 392 262 430 252" class="line"/>
  <path d="M337 552 C375 525 392 492 430 476" class="line"/>
  <path d="M675 258 C720 266 735 286 770 308" class="line"/>
  <path d="M675 506 C720 488 738 410 770 360" class="line"/>
  <path d="M1070 306 C1112 282 1128 248 1168 236" class="line"/>
  <path d="M1070 382 C1120 424 1136 504 1168 548" class="line"/>
  <path d="M1272 325 C1240 390 1240 430 1272 470" class="line dash"/>

  <rect x="166" y="686" width="1108" height="56" rx="18" fill="#ffffff" opacity="0.84" stroke="#dbe8f8"/>
  <text x="198" y="721" class="small">展示口径：核心不是表数量，而是“采集草稿 -> 审批动作 -> 安全写入 -> 审计日志 -> 队列结果”的可追踪链路。</text>
</svg>
